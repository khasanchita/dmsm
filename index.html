    <style>
        * {
            margin: 0;
            padding: 0;

            font-family: Arial, sans-serif;
        }

        body {
            background-color: rgb(89, 240, 240);
        }

        header {
            background-color: rgb(235, 235, 157);
            color: rgb(0,0,0);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .search-box {
            margin-left: 20px;
        }

        .search-box input {
            padding: 5px;
            border-radius: 4px;
            border: none;
        }

        .search-box button {
            padding: 6px 10px;
            border: none;
            background-color: #ff9800;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .products {
            padding: 30px;
        }

        .products h2 {
            margin: 40px 0 20px 0;
            font-size: 28px;
            font-weight: bold;
            color: #222;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .product-card button {
            background-color: #222;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #222;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>
